<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Minha Rotina de Treino</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');
  :root {
    --bg:#0f0f0f; --surface:#1a1a1a; --surface2:#242424; --border:#2e2e2e;

    --text:#f0efe8; --muted:#888; --danger:#f06060; --success:#60f0a0;
    --mono:'DM Mono',monospace; --sans:'DM Sans',sans-serif;
    --r:10px; --r-sm:6px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px;font-size:15px;}

  .header{position:sticky;top:0;z-index:100;background:rgba(15,15,15,0.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;}
  .header-title{font-family:var(--mono);font-size:13px;color:var(--accent);letter-spacing:.06em;}
  .header-sub{font-size:11px;color:var(--muted);margin-top:2px;}
  .btn-reset{font-family:var(--mono);font-size:11px;color:var(--muted);background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:6px 10px;cursor:pointer;}

  .week-tabs{display:flex;gap:8px;padding:14px 16px 0;overflow-x:auto;scrollbar-width:none;}
  .week-tabs::-webkit-scrollbar{display:none;}
  .week-tab{flex-shrink:0;font-family:var(--mono);font-size:11px;letter-spacing:.05em;padding:7px 14px;border-radius:99px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;}
  .week-tab.active{background:var(--accent);color:#0f0f0f;border-color:var(--accent);font-weight:500;}

  .days{padding:12px 16px;display:flex;flex-direction:column;gap:10px;}
  .day-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:border-color .15s;}
  .day-card.completed{border-color:var(--accent);}
  .day-header{display:flex;align-items:center;gap:10px;padding:13px 14px;cursor:pointer;user-select:none;-webkit-user-select:none;}
  .day-badge{font-family:var(--mono);font-size:9px;letter-spacing:.08em;padding:3px 8px;border-radius:99px;flex-shrink:0;font-weight:500;}
  .badge-musc{background:rgba(200,240,96,.15);color:var(--accent);}
  .badge-corr{background:rgba(96,200,240,.15);color:var(--accent2);}
  .badge-desc{background:rgba(136,136,136,.15);color:var(--muted);}
  .day-info{flex:1;min-width:0;}
  .day-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .day-meta{font-size:11px;color:var(--muted);margin-top:1px;}
  .day-progress-ring{flex-shrink:0;position:relative;width:32px;height:32px;}
  .day-progress-ring svg{transform:rotate(-90deg);}
  .ring-bg{fill:none;stroke:var(--border);stroke-width:2.5;}
  .ring-fill{fill:none;stroke:var(--accent);stroke-width:2.5;stroke-linecap:round;transition:stroke-dashoffset .4s ease;}
  .ring-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:9px;color:var(--muted);}
  .chevron{color:var(--muted);font-size:16px;flex-shrink:0;transition:transform .2s;}
  .chevron.open{transform:rotate(180deg);}
  .day-body{display:none;padding:0 14px 14px;}
  .day-body.open{display:block;}

  .ex-list{display:flex;flex-direction:column;gap:8px;margin-bottom:10px;}
  .ex-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);overflow:hidden;}
  .ex-item.ex-done{border-color:rgba(96,240,160,.4);}
  .ex-top{display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;}
  .ex-check{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;cursor:pointer;}
  .ex-check.checked{background:var(--success);border-color:var(--success);}
  .ex-check svg{width:11px;height:11px;stroke:#0f0f0f;stroke-width:2.5;fill:none;opacity:0;transition:opacity .15s;}
  .ex-check.checked svg{opacity:1;}
  .ex-info{flex:1;min-width:0;}
  .ex-name{font-size:13px;font-weight:500;line-height:1.3;}
  .ex-specs{font-family:var(--mono);font-size:10px;color:var(--accent);margin-top:2px;letter-spacing:.03em;}
  .ex-expand{color:var(--muted);font-size:14px;flex-shrink:0;transition:transform .2s;}
  .ex-expand.open{transform:rotate(180deg);}
  .ex-sets{display:none;padding:0 12px 12px;border-top:1px solid var(--border);}
  .ex-sets.open{display:block;}
  .sets-header{display:grid;grid-template-columns:36px 1fr 1fr auto;gap:8px;padding:8px 0 6px;font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:.06em;}
  .set-row{display:grid;grid-template-columns:36px 1fr 1fr auto;gap:8px;align-items:center;padding:5px 0;border-top:1px solid rgba(46,46,46,.6);}
  .set-num{font-family:var(--mono);font-size:11px;color:var(--muted);text-align:center;}
  .set-input{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:7px 8px;font-family:var(--mono);font-size:13px;color:var(--text);width:100%;text-align:center;outline:none;-webkit-appearance:none;appearance:none;}
  .set-input:focus{border-color:var(--accent);}
  .set-input.filled{border-color:rgba(200,240,96,.3);color:var(--accent);}
  .set-done-btn{width:28px;height:28px;border-radius:50%;flex-shrink:0;border:1.5px solid var(--border);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;}
  .set-done-btn.done{background:var(--success);border-color:var(--success);}
  .set-done-btn svg{width:12px;height:12px;stroke:var(--bg);stroke-width:2.5;fill:none;opacity:0;}
  .set-done-btn.done svg{opacity:1;}
  .ex-obs{font-size:11px;color:var(--muted);padding:8px 0 0;line-height:1.5;border-top:1px solid var(--border);margin-top:6px;}

  .run-block{background:var(--surface2);border-radius:var(--r-sm);overflow:hidden;border:1px solid var(--border);}
  .run-row{display:flex;justify-content:space-between;align-items:baseline;padding:9px 12px;border-bottom:1px solid var(--border);}
  .run-row:last-child{border-bottom:none;}
  .run-label{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.04em;}
  .run-val{font-size:13px;font-weight:500;color:var(--accent2);}

  .rest-block{text-align:center;padding:20px;color:var(--muted);font-size:13px;}
  .nota-block{background:rgba(240,160,96,.08);border:1px solid rgba(240,160,96,.2);border-radius:var(--r-sm);padding:10px 12px;margin-top:10px;font-size:11px;color:var(--accent3);line-height:1.6;}
  .nota-label{font-family:var(--mono);font-size:9px;letter-spacing:.06em;margin-bottom:4px;opacity:.7;}

  .bottom-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(15,15,15,.95);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:1px solid var(--border);padding:10px 16px 20px;display:flex;align-items:center;justify-content:space-between;}
  .progress-info{font-family:var(--mono);font-size:11px;color:var(--muted);}
  .progress-bar-wrap{flex:1;margin:0 12px;height:4px;background:var(--border);border-radius:99px;overflow:hidden;}
  .progress-bar-fill{height:100%;background:var(--accent);border-radius:99px;transition:width .4s ease;}
  .btn-save{font-family:var(--mono);font-size:12px;letter-spacing:.04em;background:var(--accent);color:#0f0f0f;border:none;border-radius:var(--r-sm);padding:9px 16px;cursor:pointer;font-weight:500;}
  .btn-save:active{opacity:.8;transform:scale(.97);}
  .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:10px 18px;font-family:var(--mono);font-size:12px;color:var(--accent);opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;z-index:200;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

let currentWeek = 2;
let state = {};

function loadState(){try{const r=localStorage.getItem('treino_v4');state=r?JSON.parse(r):{};}catch(e){state={};}}
function saveState(){try{localStorage.setItem('treino_v4',JSON.stringify(state));}catch(e){}}
function getExState(id){if(!state[id])state[id]={sets:{}};return state[id];}
function getSetState(exId,si){const es=getExState(exId);if(!es.sets[si])es.sets[si]={kg:'',done:false};return es.sets[si];}

function render(){renderTabs();renderDays();updateProgress();}

function renderTabs(){
  document.getElementById('weekTabs').innerHTML=Object.keys(WEEKS).map(wk=>`
    <button class="week-tab ${parseInt(wk)===currentWeek?'active':''}" onclick="switchWeek(${wk})">${WEEKS[wk].label}</button>`).join('');
}

function switchWeek(wk){currentWeek=parseInt(wk);renderTabs();renderDays();updateProgress();}

function renderDays(){
  document.getElementById('daysContainer').innerHTML=WEEKS[currentWeek].days.map((d,i)=>renderDay(d,i)).join('');
}

function renderDay(day,di){
  const bc=day.tipo==='musc'?'badge-musc':day.tipo==='corr'?'badge-corr':'badge-desc';
  const bl=day.tipo==='musc'?'MUSCULACAO':day.tipo==='corr'?'CORRIDA':'DESCANSO';
  const {total,done}=getDayProgress(day);
  const pct=total>0?Math.round((done/total)*100):0;
  const C=2*Math.PI*12;
  const offset=C-(pct/100)*C;
  const isComplete=total>0&&done===total;
  const ring=total>0?`<div class="day-progress-ring">
    <svg width="32" height="32" viewBox="0 0 32 32">
      <circle class="ring-bg" cx="16" cy="16" r="12"/>
      <circle class="ring-fill" cx="16" cy="16" r="12" stroke-dasharray="${C}" stroke-dashoffset="${offset}" stroke="${isComplete?'var(--success)':'var(--accent)'}"/>
    </svg><div class="ring-text">${pct}%</div></div>`:`<div style="width:32px"></div>`;

  let body='';
  if(day.tipo==='musc'&&day.exercicios)
    body=`<div class="ex-list">${day.exercicios.map((ex,ei)=>renderEx(ex,ei)).join('')}</div>`;
  else if(day.tipo==='corr'&&day.run)
    body=`<div class="run-block">${day.run.map(r=>`<div class="run-row"><span class="run-label">${r.label}</span><span class="run-val">${r.val}</span></div>`).join('')}</div>`;
  else if(day.tipo==='desc')
    body=`<div class="rest-block">✦ Descanso — sem treino estruturado</div>`;
  if(day.nota) body+=`<div class="nota-block"><div class="nota-label">NOTA</div>${day.nota}</div>`;

  return `<div class="day-card ${isComplete?'completed':''}" id="card_${day.id}">
    <div class="day-header" onclick="toggleDay('${day.id}')">
      <span class="day-badge ${bc}">${bl}</span>
      <div class="day-info"><div class="day-name">${day.name} — ${day.titulo}</div><div class="day-meta">${day.meta}</div></div>
      ${ring}
      <span class="chevron" id="chev_${day.id}">▾</span>
    </div>
    <div class="day-body" id="body_${day.id}">${body}</div>
  </div>`;
}

function renderEx(ex,ei){
  const allDone=Array.from({length:ex.series},(_,si)=>getSetState(ex.id,si).done).every(Boolean);
  let sets=`<div class="sets-header"><span style="text-align:center">SET</span><span style="text-align:center">KG</span><span style="text-align:center">REPS</span><span></span></div>`;
  for(let si=0;si<ex.series;si++){
    const ss=getSetState(ex.id,si);
    sets+=`<div class="set-row" id="setrow_${ex.id}_${si}">
      <span class="set-num">${si+1}</span>
      <input class="set-input ${ss.kg?'filled':''}" type="number" inputmode="decimal" placeholder="—" value="${ss.kg}"
        onchange="setKg('${ex.id}',${si},this.value)" onfocus="this.select()"/>
      <div style="font-family:var(--mono);font-size:12px;color:var(--muted);text-align:center;padding:7px 4px">${ex.reps}</div>
      <button class="set-done-btn ${ss.done?'done':''}" onclick="toggleSetDone('${ex.id}',${si})">
        <svg viewBox="0 0 12 10"><polyline points="1,5 4,8 11,1"/></svg>
      </button></div>`;
  }
  if(ex.obs) sets+=`<div class="ex-obs">${ex.obs}</div>`;
  return `<div class="ex-item ${allDone?'ex-done':''}" id="exitem_${ex.id}">
    <div class="ex-top" onclick="toggleEx('${ex.id}')">
      <div class="ex-check ${allDone?'checked':''}" id="excheck_${ex.id}" onclick="event.stopPropagation();toggleExDone('${ex.id}',${ex.series})">
        <svg viewBox="0 0 12 10"><polyline points="1,5 4,8 11,1"/></svg>
      </div>
      <div class="ex-info"><div class="ex-name">${ex.nome}</div><div class="ex-specs">${ex.series}x${ex.reps}</div></div>
      <span class="ex-expand" id="exexp_${ex.id}">▾</span>
    </div>
    <div class="ex-sets" id="exsets_${ex.id}">${sets}</div>
  </div>`;
}

function toggleDay(id){
  const b=document.getElementById('body_'+id),c=document.getElementById('chev_'+id);
  const o=b.classList.toggle('open');if(c)c.classList.toggle('open',o);
}
function toggleEx(id){
  const s=document.getElementById('exsets_'+id),e=document.getElementById('exexp_'+id);
  const o=s.classList.toggle('open');if(e)e.classList.toggle('open',o);
}
function setKg(exId,si,val){
  getSetState(exId,si).kg=val;
  const inp=document.querySelector(`#setrow_${exId}_${si} .set-input`);
  if(inp)inp.classList.toggle('filled',!!val);
  saveState();
}
function toggleSetDone(exId,si){
  const ss=getSetState(exId,si);ss.done=!ss.done;
  const btn=document.querySelector(`#setrow_${exId}_${si} .set-done-btn`);
  if(btn)btn.classList.toggle('done',ss.done);
  refreshExDone(exId);updateProgress();saveState();
}
function toggleExDone(exId,n){
  const rows=document.querySelectorAll(`[id^="setrow_${exId}_"]`);
  const allDone=Array.from(rows).every(r=>r.querySelector('.set-done-btn.done'));
  const nd=!allDone;
  for(let si=0;si<n;si++){
    getSetState(exId,si).done=nd;
    const btn=document.querySelector(`#setrow_${exId}_${si} .set-done-btn`);
    if(btn)btn.classList.toggle('done',nd);
  }
  refreshExDone(exId);updateProgress();saveState();
}
function refreshExDone(exId){
  const rows=document.querySelectorAll(`[id^="setrow_${exId}_"]`);
  const allDone=rows.length>0&&Array.from(rows).every(r=>r.querySelector('.set-done-btn.done'));
  const ck=document.getElementById('excheck_'+exId),it=document.getElementById('exitem_'+exId);
  if(ck)ck.classList.toggle('checked',allDone);if(it)it.classList.toggle('ex-done',allDone);
  const wk=WEEKS[currentWeek];
  for(const day of wk.days){if(!day.exercicios)continue;if(day.exercicios.some(ex=>ex.id===exId)){updateDayRing(day);break;}}
}
function updateDayRing(day){
  const {total,done}=getDayProgress(day);
  const pct=total>0?Math.round((done/total)*100):0;
  const C=2*Math.PI*12,offset=C-(pct/100)*C;
  const isComplete=total>0&&done===total;
  const ring=document.querySelector(`#card_${day.id} .ring-fill`);
  const text=document.querySelector(`#card_${day.id} .ring-text`);
  const card=document.getElementById('card_'+day.id);
  if(ring){ring.style.strokeDashoffset=offset;ring.style.stroke=isComplete?'var(--success)':'var(--accent)';}
  if(text)text.textContent=pct+'%';
  if(card)card.classList.toggle('completed',isComplete);
}
function getDayProgress(day){
  if(!day.exercicios)return{total:0,done:0};
  let t=0,d=0;
  for(const ex of day.exercicios)for(let si=0;si<ex.series;si++){t++;if(getSetState(ex.id,si).done)d++;}
  return{total:t,done:d};
}
function updateProgress(){
  const wk=WEEKS[currentWeek];let t=0,d=0;
  for(const day of wk.days){const p=getDayProgress(day);t+=p.total;d+=p.done;}
  const pct=t>0?Math.round((d/t)*100):0;
  document.getElementById('progressInfo').textContent=`${d} / ${t} sets`;
  document.getElementById('progressBar').style.width=pct+'%';
}
function saveAll(){saveState();showToast('salvo ✓');}
function confirmReset(){
  if(confirm('Resetar checagens? Os pesos salvos serao mantidos.')){
    const wk=WEEKS[currentWeek];
    for(const day of wk.days){if(!day.exercicios)continue;for(const ex of day.exercicios)for(let si=0;si<ex.series;si++)getSetState(ex.id,si).done=false;}
    saveState();renderDays();updateProgress();showToast('resetado ✓');
  }
}
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

loadState();render();
</script>
